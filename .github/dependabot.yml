version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/Kyiv
    open-pull-requests-limit: 5
    groups:
      compatible-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
